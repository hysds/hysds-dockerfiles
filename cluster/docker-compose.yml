version: '2.2'
services:
  mozart:
    hostname: mozart
    container_name: mozart
    image: hysds/mozart
    init: true
    ports:
      - "10080:80"
      - "10443:443"
      - "15555:5555"
      - "18888:8888"
      - "18898:8898"
      - "19001:9001"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${HYSDS_HOME}/mozart/etc:/home/ops/mozart/etc"
      - "${HYSDS_HOME}/datasets.json:/home/ops/mozart/etc/datasets.json"
      - "${HYSDS_HOME}/celeryconfig.py:/home/ops/mozart/etc/celeryconfig.py"
      - "${HYSDS_HOME}/mozart/log:/home/ops/mozart/log"
      - "${HOME}/.aws:/home/ops/.aws"
      - "${HOME}/.boto:/home/ops/.boto"
      - "${HOME}/.s3cfg:/home/ops/.s3cfg"
      - "${HOME}/.netrc:/home/ops/.netrc"
    volumes_from:
      - mozart-redis
    links:
      - mozart-rabbitmq
      - mozart-redis
      - mozart-opensearch
    depends_on:
      - mozart-rabbitmq
      - mozart-redis
      - mozart-opensearch
  mozart-rabbitmq:
    image: hysds/rabbitmq
    hostname: mozart-rabbitmq
    container_name: mozart-rabbitmq
    ports:
      - "15672:5672"
      - "25672:15672"
    volumes:
      - "${HYSDS_HOME}/mozart/rabbitmq:/var/lib/rabbitmq"
  mozart-redis:
    image: hysds/redis
    hostname: mozart-redis
    container_name: mozart-redis
    ports:
      - "16379:6379"
    volumes:
      - "${HYSDS_HOME}/mozart/redis:/data/redis"
  mozart-opensearch:
    image: opensearchproject/opensearch:3.4.0
    hostname: mozart-opensearch
    container_name: mozart-opensearch
    ports:
      - "19200:9200"
      - "19600:9600"
    volumes:
      - "${HYSDS_HOME}/mozart/opensearch/config:/usr/share/opensearch/config"
      - "${HYSDS_HOME}/mozart/opensearch/data:/usr/share/opensearch/data"
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms${OS_HEAP_SIZE:-512}m -Xmx${OS_HEAP_SIZE:-512}m
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=false
      - discovery.type=single-node
      - cluster.name=resource_cluster
      - node.name=mozart-opensearch
      - bootstrap.memory_lock=true
      - network.host=0.0.0.0
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
  metrics:
    hostname: metrics
    container_name: metrics
    image: hysds/metrics
    ports:
      - "20080:80"
      - "20443:443"
      - "29001:9001"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${HYSDS_HOME}/metrics/etc:/home/ops/mozart/etc"
      - "${HYSDS_HOME}/datasets.json:/home/ops/mozart/etc/datasets.json"
      - "${HYSDS_HOME}/celeryconfig.py:/home/ops/mozart/etc/celeryconfig.py"
      - "${HYSDS_HOME}/metrics/etc/config.js:/var/www/html/kibana-3.1.2/config.js"
      - "${HYSDS_HOME}/metrics/log:/home/ops/mozart/log"
      - "${HOME}/.aws:/home/ops/.aws"
      - "${HOME}/.boto:/home/ops/.boto"
      - "${HOME}/.s3cfg:/home/ops/.s3cfg"
      - "${HOME}/.netrc:/home/ops/.netrc"
    volumes_from:
      - metrics-redis
    links:
      - metrics-redis
      - metrics-opensearch
    depends_on:
      - metrics-redis
      - metrics-opensearch
  metrics-redis:
    image: hysds/redis
    hostname: metrics-redis
    container_name: metrics-redis
    ports:
      - "26379:6379"
    volumes:
      - "${HYSDS_HOME}/metrics/redis:/data/redis"
  metrics-opensearch:
    image: opensearchproject/opensearch:3.4.0
    hostname: metrics-opensearch
    container_name: metrics-opensearch
    ports:
      - "29200:9200"
      - "29600:9600"
    volumes:
      - "${HYSDS_HOME}/metrics/opensearch/config:/usr/share/opensearch/config"
      - "${HYSDS_HOME}/metrics/opensearch/data:/usr/share/opensearch/data"
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms${OS_HEAP_SIZE:-512}m -Xmx${OS_HEAP_SIZE:-512}m
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=false
      - discovery.type=single-node
      - cluster.name=metrics_cluster
      - node.name=metrics-opensearch
      - bootstrap.memory_lock=true
      - network.host=0.0.0.0
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:20080
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
  grq:
    hostname: grq
    container_name: grq
    image: hysds/grq
    ports:
      - "30080:80"
      - "30443:443"
      - "38878:8878"
      - "38879:8879"
      - "39001:9001"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${HYSDS_HOME}/grq/etc:/home/ops/sciflo/etc"
      - "${HYSDS_HOME}/datasets.json:/home/ops/sciflo/etc/datasets.json"
      - "${HYSDS_HOME}/celeryconfig.py:/home/ops/sciflo/etc/celeryconfig.py"
      - "${HYSDS_HOME}/grq/log:/home/ops/sciflo/log"
      - "${HOME}/.aws:/home/ops/.aws"
      - "${HOME}/.boto:/home/ops/.boto"
      - "${HOME}/.s3cfg:/home/ops/.s3cfg"
      - "${HOME}/.netrc:/home/ops/.netrc"
    links:
      - grq-redis
      - grq-opensearch
    depends_on:
      - grq-redis
      - grq-opensearch
  grq-redis:
    image: hysds/redis
    hostname: grq-redis
    container_name: grq-redis
    ports:
      - "36379:6379"
    volumes:
      - "${HYSDS_HOME}/grq/redis:/data/redis"
  grq-opensearch:
    image: opensearchproject/opensearch:3.4.0
    hostname: grq-opensearch
    container_name: grq-opensearch
    ports:
      - "39200:9200"
      - "39600:9600"
    volumes:
      - "${HYSDS_HOME}/grq/opensearch/config:/usr/share/opensearch/config"
      - "${HYSDS_HOME}/grq/opensearch/data:/usr/share/opensearch/data"
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms${OS_HEAP_SIZE:-512}m -Xmx${OS_HEAP_SIZE:-512}m
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=false
      - discovery.type=single-node
      - cluster.name=products_cluster
      - node.name=grq-opensearch
      - bootstrap.memory_lock=true
      - network.host=0.0.0.0
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
  verdi:
    hostname: verdi
    container_name: verdi
    image: hysds/verdi
    ports:
      - "40080:80"
      - "40443:443"
      - "48085:8085"
      - "49001:9001"
      - "46224:46224"
      - "46224:46224/udp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${HYSDS_HOME}/verdi/etc:/home/ops/verdi/etc"
      - "${HYSDS_HOME}/datasets.json:/home/ops/verdi/etc/datasets.json"
      - "${HYSDS_HOME}/celeryconfig.py:/home/ops/verdi/etc/celeryconfig.py"
      - "${HYSDS_HOME}/verdi/log:/home/ops/verdi/log"
      - "${HOME}/.aws:/home/ops/.aws"
      - "${HOME}/.boto:/home/ops/.boto"
      - "${HOME}/.s3cfg:/home/ops/.s3cfg"
      - "${HOME}/.netrc:/home/ops/.netrc"
    depends_on:
      - mozart
      - metrics
      - grq
  ci:
    hostname: ci
    container_name: ci
    image: hysds/ci
    ports:
      - "50080:80"
      - "50443:443"
      - "48081:8080"
      - "49002:9001"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${HYSDS_HOME}/ci/etc:/home/ops/verdi/etc"
      - "${HYSDS_HOME}/ci/log:/home/ops/verdi/log"
      - "${HOME}/.aws:/home/ops/.aws"
      - "${HOME}/.boto:/home/ops/.boto"
      - "${HOME}/.s3cfg:/home/ops/.s3cfg"
      - "${HOME}/.netrc:/home/ops/.netrc"
      - "/home/ops/jenkins"
      - "/home/ops/.jenkins"
    depends_on:
      - mozart
      - grq
